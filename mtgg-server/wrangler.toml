name = "mtgg-server"
main = "src/index.ts"
compatibility_date = "2024-01-15"

# ── KV namespace for room + signal state ──────────────────────────────────────
# Run: wrangler kv:namespace create ROOMS
# Then paste the returned id and preview_id below.
[[kv_namespaces]]
binding = "ROOMS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"
